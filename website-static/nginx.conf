server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  absolute_redirect off;
  port_in_redirect off;
  index index.html;
  gzip on; gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  add_header X-Content-Type-Options nosniff;
  # One shared runtime config loader for every static HTML page. The @legacy
  # location defines its own filters, so this injection stays on the v2 site.
  sub_filter '</body>' '<script src="/assets/site-config.js?v=720a"></script></body>';
  sub_filter_once on;

  # Legacy Next.js keeps serving the long-tail SEO surface: blog/model detail
  # pages, non-static localized pages and acquisition landings. Core marketing
  # pages below have one extensionless canonical URL on this static service.
  resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
  set $legacy newapi-website-legacy-5qjldqffdq-uw.a.run.app;

  location ~* \.(png|jpg|jpeg|webp|svg|ico|woff2|mp4)$ { expires 7d; add_header Cache-Control "public"; try_files $uri @legacy; }
  location ~* \.(css|js)$ { expires 1h; add_header Cache-Control "public"; try_files $uri @legacy; }

  # Canonical aliases. Old static .html URLs permanently consolidate into the
  # extensionless routes used by canonical tags, navigation and the sitemap.
  location = /index.html { return 301 /; }
  location = /about.html { return 301 /about; }
  location = /about-zh.html { return 301 /zh/about; }
  location = /careers.html { return 301 /careers; }
  location = /careers-zh.html { return 301 /zh/careers; }
  location = /topup.html { return 301 /pricing; }
  location = /legal-sla.html { return 301 /sla; }
  location ~ ^/(models|docs|playground|compute|usecases|contact|status|terms|privacy|refund-policy|sla)\.html$ { return 301 /$1; }
  location ~ ^/(zh|es|pt|fr|id|de|vi|ru|ja)\.html$ { return 301 /$1; }

  location = /career { return 301 /careers; }
  location = /zh/career { return 301 /zh/careers; }

  # Canonical static marketing routes.
  location = /models { try_files /models.html =404; }
  location ~ ^/models/[a-zA-Z0-9._-]+/?$ { try_files /model.html =404; }
  location = /docs { try_files /docs.html =404; }
  location = /playground { try_files /playground.html =404; }
  location = /pricing { try_files /topup.html =404; }
  location = /compute { try_files /compute.html =404; }
  location = /usecases { try_files /usecases.html =404; }
  location = /contact { try_files /contact.html =404; }
  location = /status { try_files /status.html =404; }
  location = /terms { try_files /terms.html =404; }
  location = /privacy { try_files /privacy.html =404; }
  location = /refund-policy { try_files /refund-policy.html =404; }
  location = /sla { try_files /sla.html =404; }
  location = /about { try_files /about.html =404; }
  location = /zh/about { try_files /about-zh.html =404; }
  location = /careers { try_files /careers.html =404; }
  location = /zh/careers { try_files /careers-zh.html =404; }
  # Single auth entry point: collapse the duplicate static login/signup pages
  # straight to the console's OAuth-first auth screen (no intermediate static
  # login.html). Every static-site "Sign in" / "Start free" link points at
  # login.html or /login, so redirecting here de-duplicates all of them at once.
  location = /login { return 302 https://console.flatkey.ai/sign-up?redirect=/keys; }
  location = /login.html { return 301 https://console.flatkey.ai/sign-up?redirect=/keys; }
  location = /signup.html { return 301 https://console.flatkey.ai/sign-up?redirect=/keys; }
  location = /onboarding.html { return 302 https://console.flatkey.ai/; }
  location = /console.html { return 302 https://console.flatkey.ai/; }

  # Same-origin bridge for the existing public admin setting. Browser cookies
  # are intentionally not forwarded; the response is already public status data.
  location = /api/status {
    proxy_pass ${APP_CONSOLE_ORIGIN}/api/status;
    proxy_ssl_server_name on;
    proxy_ssl_name $proxy_host;
    proxy_set_header Host $proxy_host;
    proxy_set_header Cookie "";
    proxy_set_header Authorization "";
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;
    proxy_connect_timeout 3s;
    proxy_read_timeout 3s;
    proxy_send_timeout 3s;
    proxy_hide_header Cache-Control;
    proxy_hide_header Expires;
    proxy_hide_header Set-Cookie;
    add_header X-Content-Type-Options nosniff always;
    add_header Cache-Control "public, max-age=60" always;
  }

  # the one deliberate override: redesigned homepage
  location = / { try_files /index.html =404; }

  # subscription pricing: localized /xx/pricing URLs (ads final URLs included)
  # serve the static plans page; the canonical /pricing alias is defined above.
  # topup.html carries <base href="/"> so relative assets resolve under /pt/pricing.
  location ~ ^/(zh|es|pt|fr|id|de|vi|ru|ja)/pricing/?$ { try_files /topup.html =404; }

  # localized homepages (static, generated from the v2 design + i18n dictionaries)
  location ~ ^/(zh|es|pt|fr|id|de|vi|ru|ja)/?$ { try_files /$1.html =404; }

  # merged sitemap: /sitemap.xml is a static index pointing at both the legacy
  # full inventory (proxied below) and the v2 static pages (sitemap-v2.xml file)
  location = /sitemap-site.xml {
    proxy_pass https://$legacy/sitemap.xml;
    proxy_ssl_server_name on;
    proxy_ssl_name $legacy;
    proxy_set_header Host $legacy;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Accept-Encoding "";
    proxy_http_version 1.1;
    proxy_read_timeout 30s;
    sub_filter_types application/xml text/xml;
    sub_filter 'lang="en"' 'lang="en-US"';
    sub_filter 'lang="zh"' 'lang="zh-CN"';
    sub_filter 'lang="es"' 'lang="es-ES"';
    sub_filter 'lang="fr"' 'lang="fr-FR"';
    sub_filter 'lang="pt"' 'lang="pt-PT"';
    sub_filter 'lang="ru"' 'lang="ru-RU"';
    sub_filter 'lang="ja"' 'lang="ja-JP"';
    sub_filter 'lang="vi"' 'lang="vi-VN"';
    sub_filter 'lang="de"' 'lang="de-DE"';
    sub_filter 'lang="id"' 'lang="id-ID"';
    sub_filter_once off;
  }

  location / { try_files $uri @legacy; }

  location @legacy {
    proxy_pass https://$legacy;
    proxy_ssl_server_name on;
    proxy_ssl_name $legacy;
    proxy_set_header Host $legacy;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host flatkey.ai;
    proxy_http_version 1.1;
    proxy_read_timeout 30s;
    proxy_redirect https://$legacy/ /;
    # Unify legacy pages with the v2 design system without rewriting any
    # server-rendered text. Mutating React SSR text here causes hydration errors
    # because the legacy client bundle still expects the original wordmark.
    # /flatkey-mark.svg is overridden by the static v2 pixel-key file.
    proxy_set_header Accept-Encoding "";
    sub_filter '</head>' '<link rel="stylesheet" href="/assets/legacy-skin.css?v=716b"></head>';
    sub_filter 'lang="en"' 'lang="en-US"';
    sub_filter 'lang="zh"' 'lang="zh-CN"';
    sub_filter 'lang="es"' 'lang="es-ES"';
    sub_filter 'lang="fr"' 'lang="fr-FR"';
    sub_filter 'lang="pt"' 'lang="pt-PT"';
    sub_filter 'lang="ru"' 'lang="ru-RU"';
    sub_filter 'lang="ja"' 'lang="ja-JP"';
    sub_filter 'lang="vi"' 'lang="vi-VN"';
    sub_filter 'lang="de"' 'lang="de-DE"';
    sub_filter 'lang="id"' 'lang="id-ID"';
    sub_filter_once off;
  }
}
