server {
  listen 8080;
  server_name _;
  root /usr/share/nginx/html;
  absolute_redirect off;
  port_in_redirect off;
  index index.html;
  gzip on; gzip_types text/css application/javascript application/json image/svg+xml text/plain;
  add_header X-Content-Type-Options nosniff;
  location ~* \.(png|jpg|svg|woff2|mp4)$ { expires 7d; add_header Cache-Control "public"; }
  location ~* \.(css|js)$ { expires 1h; add_header Cache-Control "public"; }
location = /pricing { return 301 /topup.html; }
  location = /models { return 301 /models.html; }
  location = /rankings { return 301 /models.html; }
  location = /use-case/codex { return 301 /usecases.html; }
  location = /use-case/claude-code { return 301 /usecases.html; }
  location = /use-case/image-buddy { return 301 /usecases.html; }
  location = /contact { return 301 /contact.html; }
  location = /zh { return 302 /index.html; }
  location = /es { return 302 /index.html; }
  location = /fr { return 302 /index.html; }
  location = /pt { return 302 /index.html; }
  location = /ru { return 302 /index.html; }
  location = /ja { return 302 /index.html; }
  location = /vi { return 302 /index.html; }
  location = /de { return 302 /index.html; }
  location = /id { return 302 /index.html; }
  location = /login { return 302 /login.html; }
  location ^~ /use-case { return 301 /usecases.html; }
  location = /terms { return 302 /terms.html; }
  location = /privacy { return 302 /privacy.html; }
  location = /refund-policy { return 302 /refund-policy.html; }
  location = /sla { return 302 /sla.html; }
  location ^~ /blog { return 302 /; }
  location = /blog { return 302 /; }
  location = /signup.html { return 301 /login.html; }
  location = /onboarding.html { return 302 https://console.flatkey.ai/; }
  location = /console.html { return 302 https://console.flatkey.ai/; }
  location / { try_files $uri $uri.html $uri/ =404; }
}
