# Spanish translations (email content only; other keys fall back to English)

# Email content messages
email.verification_subject: "Verificación de correo electrónico de {{.SystemName}}"
email.verification_content: "<p>Hola, está verificando su correo electrónico para {{.SystemName}}.</p><p>Su código de verificación es: <strong>{{.Code}}</strong></p><p>El código es válido durante {{.Minutes}} minutos. Si no fue usted, ignore este correo.</p>"
email.password_reset_subject: "Restablecimiento de contraseña de {{.SystemName}}"
email.password_reset_content: "<p>Hola, está restableciendo la contraseña de su cuenta de {{.SystemName}}.</p><p>Haga clic <a href='{{.Link}}'>aquí</a> para restablecer su contraseña.</p><p>Si el enlace no funciona, copie el siguiente enlace en su navegador:<br> {{.Link}} </p><p>El enlace de restablecimiento es válido durante {{.Minutes}} minutos. Si no fue usted, ignore este correo.</p>"
email.topup_recall_subject: "{{.SystemName}}: $2 de descuento en tu primera recarga"
email.topup_recall_content: "<p>Hola, dejaste una recarga de {{.Amount}} sin terminar.</p><p>Usa el código único <strong>{{.Code}}</strong> en Stripe Checkout para obtener $2 de descuento en tu próxima recarga.</p><p>El saldo no usado se puede reembolsar en {{.RefundDays}} días, sin preguntas.</p><p>Termina la recarga aquí: <a href='{{.Link}}'>{{.Link}}</a></p>"

# User notification messages
notify.quota_warning_title: "Su cuota se está agotando"
notify.subscription_quota_warning_title: "Su cuota de suscripción se está agotando"
notify.quota_warning_email: "{{.Warning}}. Su cuota restante actual es {{.Quota}}. Para evitar interrupciones del servicio, recargue a tiempo.<br/>Enlace de recarga: <a href='{{.Link}}'>{{.Link}}</a>"
notify.quota_warning_bark: "{{.Warning}}. Cuota restante: {{.Quota}}. Recargue a tiempo."
notify.quota_warning_gotify: "{{.Warning}}. Su cuota restante actual es {{.Quota}}. Recargue a tiempo."
