name: Supplier accounting capacity evidence

# Manual, required pre-activation release gate. This is not merge CI.

on:
  workflow_dispatch:
    inputs:
      production_p99_daily_logs:
        description: Measured production p99 daily successful consume-log volume V; target rounds up to a multiple of 20 after max(1,000,000, 2x V)
        required: true
        type: string
      measurement_window_start:
        description: RFC3339 start of the production V measurement window
        required: true
        type: string
      measurement_window_end:
        description: RFC3339 end of the production V measurement window
        required: true
        type: string
      source_reference:
        description: Reviewable production query/report identifier used to obtain V
        required: true
        type: string
      source_sha256:
        description: SHA-256 of the immutable query/report source (64 lowercase hex)
        required: true
        type: string

permissions:
  contents: read

jobs:
  local-capacity:
    name: Local MySQL/PostgreSQL capacity gate
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    defaults:
      run:
        shell: bash
    services:
      mysql:
        image: mysql:8.0.46@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b
        env:
          MYSQL_ROOT_PASSWORD: supplier-capacity
          MYSQL_DATABASE: supplier_g009_mysql
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -psupplier-capacity"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
      postgres:
        image: postgres:15.18-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f
        env:
          POSTGRES_PASSWORD: supplier-capacity
          POSTGRES_DB: supplier_g009_postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d supplier_g009_postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Record workflow start
        env:
          SUPPLIER_CAPACITY_EVIDENCE_DIR: ${{ runner.temp }}/supplier-capacity
        run: |
          set -euo pipefail
          mkdir -p "$SUPPLIER_CAPACITY_EVIDENCE_DIR"
          rm -f "$SUPPLIER_CAPACITY_EVIDENCE_DIR/SUCCESS_MANIFEST.json"
          printf 'SUPPLIER_CAPACITY_WORKFLOW_STARTED_AT=%s\n' "$(date -u +'%Y-%m-%dT%H:%M:%S.%NZ')" >> "$GITHUB_ENV"

      - name: Validate p99 input
        env:
          PRODUCTION_P99_DAILY_LOGS: ${{ inputs.production_p99_daily_logs }}
        run: |
          set -euo pipefail
          case "$PRODUCTION_P99_DAILY_LOGS" in
            ''|*[!0-9]*|0) echo "production_p99_daily_logs must be a positive integer" >&2; exit 1 ;;
          esac

      - name: Provision destructive-test sentinels
        env:
          ISOLATION_TOKEN: supplier-capacity-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          docker exec "${{ job.services.mysql.id }}" mysql \
            -uroot -psupplier-capacity supplier_g009_mysql \
            -e "CREATE TABLE supplier_capacity_test_sentinel (token VARCHAR(255) PRIMARY KEY); INSERT INTO supplier_capacity_test_sentinel(token) VALUES ('$ISOLATION_TOKEN');"
          docker exec "${{ job.services.postgres.id }}" psql \
            -U postgres -d supplier_g009_postgres -v ON_ERROR_STOP=1 \
            -c "CREATE TABLE supplier_capacity_test_sentinel (token VARCHAR(255) PRIMARY KEY); INSERT INTO supplier_capacity_test_sentinel(token) VALUES ('$ISOLATION_TOKEN');"

      - name: Run cold-refresh and T+1 local capacity gates
        env:
          RUN_SUPPLIER_CAPACITY_TEST: "1"
          RUN_SUPPLIER_T1_CAPACITY_TEST: "1"
          SUPPLIER_CAPACITY_ISOLATION_TOKEN: supplier-capacity-${{ github.run_id }}-${{ github.run_attempt }}
          SUPPLIER_PRODUCTION_P99_DAILY_LOGS: ${{ inputs.production_p99_daily_logs }}
          SUPPLIER_CAPACITY_MEASUREMENT_WINDOW_START: ${{ inputs.measurement_window_start }}
          SUPPLIER_CAPACITY_MEASUREMENT_WINDOW_END: ${{ inputs.measurement_window_end }}
          SUPPLIER_CAPACITY_SOURCE_REFERENCE: ${{ inputs.source_reference }}
          SUPPLIER_CAPACITY_SOURCE_SHA256: ${{ inputs.source_sha256 }}
          SUPPLIER_CAPACITY_EVIDENCE_DIR: ${{ runner.temp }}/supplier-capacity
          TEST_MYSQL_DSN: root:supplier-capacity@tcp(127.0.0.1:3306)/supplier_g009_mysql?charset=utf8mb4&parseTime=True&loc=Local
          TEST_POSTGRES_DSN: host=127.0.0.1 port=5432 user=postgres password=supplier-capacity dbname=supplier_g009_postgres sslmode=disable TimeZone=Asia/Shanghai
        run: |
          set -euo pipefail
          mkdir -p "$SUPPLIER_CAPACITY_EVIDENCE_DIR"
          go test ./pkg/perf_metrics \
            -run '^TestSupplierAccountingBacklogMaximumRouterBurstCapacity$' \
            -count=1 -v -timeout=15m \
            | tee "$SUPPLIER_CAPACITY_EVIDENCE_DIR/observer-test.log"
          go test ./capacity \
            -run '^TestSupplierT1ProductionP99Capacity$' \
            -count=1 -v -timeout=120m \
            | tee "$SUPPLIER_CAPACITY_EVIDENCE_DIR/t1-test.log"

      - name: Record local-only evidence boundary
        if: always()
        env:
          SUPPLIER_CAPACITY_EVIDENCE_DIR: ${{ runner.temp }}/supplier-capacity
        run: |
          set -euo pipefail
          mkdir -p "$SUPPLIER_CAPACITY_EVIDENCE_DIR"
          printf '%s\n' \
            'This manual workflow is a required pre-activation release gate, not merge CI.' \
            'Runner: ubuntu-24.04; MySQL image: mysql:8.0.46@sha256:7dcddc01f13bab2f15cde676d44d01f61fc9f99fe7785e86196dfc07d358ae2b; PostgreSQL image: postgres:15.18-alpine@sha256:3d0f7584ed7d04e27fa050d6683a74746608faf21f202be78460d679cc56461f.' \
            'Generated JSON from this run is local synthetic evidence only; checked-in draft evidence is never uploaded.' \
            'SUCCESS_MANIFEST.json attests only this local capacity run; it does not authenticate the operator-provided production source reference, SHA-256, measurement window, or V.' \
            'Before approval, the release approver must independently retrieve the immutable source, recompute its SHA-256, and reconcile its V, measurement window, and reference with the generated JSON.' \
            'Activation remains blocked until that independent external-source verification is recorded.' \
            'Production-distribution EXPLAIN, rows read <=1.2x, Cloud SQL CPU, lock-wait distribution, and replica lag remain release blockers.' \
            'Activation requires a production-distribution clone or an approved read-only production sample.' \
            > "$SUPPLIER_CAPACITY_EVIDENCE_DIR/RELEASE_BLOCKERS.txt"

      - name: Validate and attest successful evidence
        if: success()
        env:
          SUPPLIER_CAPACITY_EVIDENCE_DIR: ${{ runner.temp }}/supplier-capacity
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import hashlib
          import json
          import os
          from datetime import datetime, timezone
          from pathlib import Path

          evidence_dir = Path(os.environ["SUPPLIER_CAPACITY_EVIDENCE_DIR"])
          manifest_path = evidence_dir / "SUCCESS_MANIFEST.json"
          if manifest_path.exists():
              raise SystemExit("refusing to validate with a pre-existing SUCCESS_MANIFEST.json")

          expected_names = {
              "supplier-observer.json",
              "supplier-t1-mysql.json",
              "supplier-t1-postgres.json",
          }
          actual_names = {path.name for path in evidence_dir.glob("*.json") if path.is_file()}
          if actual_names != expected_names:
              raise SystemExit(f"expected exactly {sorted(expected_names)}, found {sorted(actual_names)}")

          def parse_timestamp(value, field):
              if not isinstance(value, str):
                  raise SystemExit(f"{field} must be an RFC3339 string")
              try:
                  parsed = datetime.fromisoformat(value.replace("Z", "+00:00"))
              except ValueError as error:
                  raise SystemExit(f"invalid {field}: {error}") from error
              if parsed.tzinfo is None:
                  raise SystemExit(f"{field} must include a timezone")
              return parsed.astimezone(timezone.utc)

          started_at = parse_timestamp(os.environ["SUPPLIER_CAPACITY_WORKFLOW_STARTED_AT"], "workflow start")
          validated_at = datetime.now(timezone.utc)
          commit = os.environ["GITHUB_SHA"]
          documents = {}
          for name in sorted(expected_names):
              with (evidence_dir / name).open("r", encoding="utf-8") as source:
                  documents[name] = json.load(source)
              document = documents[name]
              if document.get("commit") != commit:
                  raise SystemExit(f"{name}: commit does not equal GITHUB_SHA")
              if document.get("working_tree_dirty") is not False:
                  raise SystemExit(f"{name}: working_tree_dirty must be false")
              generated_at = parse_timestamp(document.get("generated_at"), f"{name} generated_at")
              if not started_at <= generated_at <= validated_at:
                  raise SystemExit(f"{name}: generated_at is outside the workflow validation window")

          observer = documents["supplier-observer.json"]
          if observer.get("schema_version") != 2:
              raise SystemExit("supplier-observer.json: schema_version must be 2")
          if observer.get("evidence_class") != "generated_local_synthetic_not_production_equivalent":
              raise SystemExit("supplier-observer.json: unexpected evidence_class")
          observer_dialects = {database.get("dialect") for database in observer.get("databases", []) if isinstance(database, dict)}
          if observer_dialects != {"mysql", "postgres"} or len(observer.get("databases", [])) != 2:
              raise SystemExit("supplier-observer.json: databases must contain exactly mysql and postgres")

          for dialect in ("mysql", "postgres"):
              name = f"supplier-t1-{dialect}.json"
              document = documents[name]
              if document.get("schema_version") != 1:
                  raise SystemExit(f"{name}: schema_version must be 1")
              if document.get("evidence_class") != "local_capacity_not_production_equivalent":
                  raise SystemExit(f"{name}: evidence_class must be the non-smoke class")
              if document.get("database") != dialect:
                  raise SystemExit(f"{name}: database must be {dialect}")

          runner = {
              "ImageOS": os.environ.get("ImageOS", ""),
              "ImageVersion": os.environ.get("ImageVersion", ""),
              "RUNNER_OS": os.environ.get("RUNNER_OS", ""),
              "RUNNER_ARCH": os.environ.get("RUNNER_ARCH", ""),
          }
          missing_runner_fields = sorted(key for key, value in runner.items() if not value)
          if missing_runner_fields:
              raise SystemExit(f"missing runner metadata: {missing_runner_fields}")

          evidence = []
          for name in sorted(expected_names):
              digest = hashlib.sha256((evidence_dir / name).read_bytes()).hexdigest()
              evidence.append({"file": name, "sha256": digest})
          manifest = {
              "schema_version": 1,
              "status": "success",
              "attestation_scope": "local_capacity_run_only",
              "commit": commit,
              "workflow_started_at": os.environ["SUPPLIER_CAPACITY_WORKFLOW_STARTED_AT"],
              "validated_at": validated_at.isoformat().replace("+00:00", "Z"),
              "runner": runner,
              "evidence": evidence,
          }
          temporary_path = manifest_path.with_suffix(".json.tmp")
          temporary_path.write_text(json.dumps(manifest, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          temporary_path.replace(manifest_path)
          PY

      - name: Upload capacity evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: supplier-capacity-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/supplier-capacity
          if-no-files-found: error
          retention-days: 90
