name: GCP Deploy

# Push to main builds the Go image and opens separate console/router production
# deploy approval jobs. Nothing reaches production unless an authorized reviewer
# approves the target-specific GitHub Environment.

on:
  push:
    branches: [main]
    # Skip the Go app build for website-only changes (those are handled by
    # gcp-deploy-website.yml). A push that also touches app code still builds.
    paths-ignore:
      - 'website/**'
      - '.github/workflows/gcp-deploy-website.yml'
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Production target to deploy"
        required: true
        default: "console"
        type: choice
        options:
          - console
          - router
          - both
          - none
      image_tag:
        description: "Existing image tag to deploy (skip build). Format: sha-<commit> or v1.2.3"
        required: false
        type: string

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  PROJECT_ID:  ${{ vars.GCP_PROJECT_ID }}
  REGION:      ${{ vars.GCP_REGION }}
  AR_REPO_URL: ${{ vars.GCP_AR_REPO_URL }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.compute_image.outputs.image_uri }}
      image_ref: ${{ steps.resolve_image.outputs.image_ref }}
      oci_digest: ${{ steps.resolve_image.outputs.oci_digest }}
      manifest_sha256: ${{ steps.manifest.outputs.manifest_sha256 }}
      binding_artifact: ${{ steps.binding.outputs.artifact_name }}
      short_sha: ${{ steps.compute_image.outputs.short_sha }}
      deploy_target: ${{ steps.compute_target.outputs.deploy_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute deploy target
        id: compute_target
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "push" ]]; then
            deploy_target="console+router approval"
          else
            deploy_target="${{ inputs.deploy_target || 'none' }}"
          fi
          echo "deploy_target=${deploy_target}" >> "$GITHUB_OUTPUT"
          echo "Deploy target: ${deploy_target}"

      - name: Compute image URI
        id: compute_image
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "Tag-only promotion has no immutable manifest/OCI binding and is disabled; use the rollback workflow with binding evidence." >&2
            exit 1
          fi
          echo "image_uri=${AR_REPO_URL}/server:sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Generate canonical build manifest
        id: manifest
        run: |
          set -euo pipefail
          .github/scripts/supplier-build-manifest.sh build-manifest \
            "${GITHUB_REPOSITORY}" "${GITHUB_SHA}" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" \
            "gcp-deploy-build" "1" "1"
          .github/scripts/supplier-deploy-verify.sh manifest \
            build-manifest/manifest_hash_payload.json build-manifest/manifest_sha256.txt
          echo "manifest_sha256=$(cat build-manifest/manifest_sha256.txt)" >> "$GITHUB_OUTPUT"

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528088078482/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: newapi-ci-deployer@vocai-gemini-prod.iam.gserviceaccount.com

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_GADS_CONVERSION_ID=${{ vars.VITE_GADS_CONVERSION_ID }}
            VITE_GADS_SIGNUP_SEND_TO=${{ vars.VITE_GADS_SIGNUP_SEND_TO }}
            VITE_GADS_TOPUP_SEND_TO=${{ vars.VITE_GADS_TOPUP_SEND_TO }}
            VITE_TIKTOK_PIXEL_ID=${{ vars.VITE_TIKTOK_PIXEL_ID }}
            VITE_META_PIXEL_ID=${{ vars.VITE_META_PIXEL_ID }}
            VITE_X_PIXEL_ID=${{ vars.VITE_X_PIXEL_ID }}
            VITE_X_SIGNUP_EVENT_ID=${{ vars.VITE_X_SIGNUP_EVENT_ID }}
            VITE_X_TOPUP_EVENT_ID=${{ vars.VITE_X_TOPUP_EVENT_ID }}
            VITE_OFFICIAL_WEBSITE_ORIGIN=${{ secrets.OFFICIAL_WEBSITE_ORIGIN }}
            VITE_COOKIE_SESSION_DOMAIN=${{ secrets.COOKIE_SESSION_DOMAIN }}
            BUILD_REPO=${{ github.repository }}
            BUILD_COMMIT=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            RUN_ATTEMPT=${{ github.run_attempt }}
            BUILD_JOB_IDENTITY=gcp-deploy-build
          tags: |
            ${{ steps.compute_image.outputs.image_uri }}
            ${{ env.AR_REPO_URL }}/server:main-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max,ignore-error=true

      - name: Resolve immutable image and write binding
        id: resolve_image
        run: |
          set -euo pipefail
          digest="${{ steps.push.outputs.digest }}"
          .github/scripts/supplier-deploy-verify.sh oci "${digest}" "${digest}"
          image_ref="${AR_REPO_URL}/server@${digest}"
          echo "oci_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${image_ref}" >> "$GITHUB_OUTPUT"

      - name: Create immutable deployment binding
        id: binding
        run: |
          set -euo pipefail
          artifact_name="supplier-deployment-binding-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p deployment-binding
          .github/scripts/supplier-deploy-verify.sh binding-write \
            "${{ steps.resolve_image.outputs.oci_digest }}" "${{ steps.manifest.outputs.manifest_sha256 }}" \
            deployment-binding/binding.json
          cp build-manifest/manifest_hash_payload.json build-manifest/manifest_sha256.txt deployment-binding/
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Retain immutable binding for rollback lifetime
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binding.outputs.artifact_name }}
          path: deployment-binding/
          if-no-files-found: error
          retention-days: 90

      - name: Summary
        run: |
          echo "### Go image build" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ steps.resolve_image.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Binding: \`${{ steps.binding.outputs.artifact_name }}\` (90-day rollback lifetime)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Deploy target: \`${{ steps.compute_target.outputs.deploy_target }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "- Production deploy: approve \`deploy console\` and/or \`deploy router\` in their separate environments." >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy-console:
    name: deploy console
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.deploy_target == 'console' || inputs.deploy_target == 'both'))
    needs: build
    runs-on: ubuntu-latest
    environment: production-console
    env:
      RUN_SERVICE: newapi-console
      NODE_TYPE: master
      APP_ROLE: console
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528088078482/locations/global/workloadIdentityPools/github-prod-app-deploy/providers/github
          service_account: newapi-prod-console-deployer@vocai-gemini-prod.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download immutable build evidence
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.binding_artifact }}
          path: deployment-binding

      - name: Console mutation-protocol barrier
        id: console_preflight
        env:
          ROOT_ACCESS_TOKEN: ${{ secrets.SUPPLIER_DEPLOY_ROOT_ACCESS_TOKEN }}
          ROOT_USER_ID: ${{ vars.SUPPLIER_DEPLOY_ROOT_USER_ID }}
          CONTROL_PLANE_URL: https://console.flatkey.ai
        run: |
          set -euo pipefail
          gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" --format=json > /tmp/current-console-service.json
          previous_revision="$(jq -er '
            [.status.traffic[] | select((.percent // 0) == 100) | .revisionName] |
            if length == 1 and .[0] != null and .[0] != "" then .[0]
            else error("expected exactly one revision serving 100% traffic") end
          ' /tmp/current-console-service.json)"
          echo "previous_revision=${previous_revision}" >> "$GITHUB_OUTPUT"
          code="$(curl -sS -o /tmp/current-accounting.json -w '%{http_code}' \
            -H "Authorization: ${ROOT_ACCESS_TOKEN}" -H "New-Api-User: ${ROOT_USER_ID}" \
            "${CONTROL_PLANE_URL}/api/supply-chain/accounting/status" || true)"
          if [[ "${code}" == "404" ]]; then
            echo "Initial route-absence proof passed."
            echo "control_plane_mode=route-absent" >> "$GITHUB_OUTPUT"
          elif [[ "${code}" == "200" ]]; then
            [[ -n "${ROOT_ACCESS_TOKEN}" && -n "${ROOT_USER_ID}" ]] || { echo "shared-gate preflight credentials unavailable" >&2; exit 1; }
            jq -e '.success == true and .data.mutation.enabled == false' /tmp/current-accounting.json >/dev/null || {
              echo "current Console does not prove the shared versioned mutation gate is disabled" >&2; exit 1;
            }
            echo "Shared-gate bridge proof passed."
            echo "control_plane_mode=bridge" >> "$GITHUB_OUTPUT"
          else
            echo "Cannot prove old route absence or a disabled shared gate (HTTP ${code})." >&2
            exit 1
          fi

      - name: Deploy new revision with NO traffic
        id: deploy
        env:
          PADDLE_ENVIRONMENT: ${{ vars.PADDLE_ENVIRONMENT }}
          PADDLE_SANDBOX_PRODUCT_ID: ${{ vars.PADDLE_SANDBOX_PRODUCT_ID }}
          PADDLE_SANDBOX_CURRENCY: ${{ vars.PADDLE_SANDBOX_CURRENCY }}
          PADDLE_SANDBOX_UNIT_PRICE: ${{ vars.PADDLE_SANDBOX_UNIT_PRICE }}
          PADDLE_SANDBOX_MIN_TOPUP: ${{ vars.PADDLE_SANDBOX_MIN_TOPUP }}
          PADDLE_SANDBOX_API_KEY: ${{ secrets.PADDLE_SANDBOX_API_KEY }}
          PADDLE_SANDBOX_CLIENT_TOKEN: ${{ secrets.PADDLE_SANDBOX_CLIENT_TOKEN }}
          PADDLE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.PADDLE_SANDBOX_WEBHOOK_SECRET }}
          PADDLE_LIVE_PRODUCT_ID: ${{ vars.PADDLE_LIVE_PRODUCT_ID }}
          PADDLE_LIVE_CURRENCY: ${{ vars.PADDLE_LIVE_CURRENCY }}
          PADDLE_LIVE_UNIT_PRICE: ${{ vars.PADDLE_LIVE_UNIT_PRICE }}
          PADDLE_LIVE_MIN_TOPUP: ${{ vars.PADDLE_LIVE_MIN_TOPUP }}
          PADDLE_LIVE_API_KEY: ${{ secrets.PADDLE_LIVE_API_KEY }}
          PADDLE_LIVE_CLIENT_TOKEN: ${{ secrets.PADDLE_LIVE_CLIENT_TOKEN }}
          PADDLE_LIVE_WEBHOOK_SECRET: ${{ secrets.PADDLE_LIVE_WEBHOOK_SECRET }}
          GA_MEASURE_PROTOCOL_API_SECRET: ${{ secrets.GA_MEASURE_PROTOCOL_API_SECRET }}
          GA_MESSUREMENT_ID: ${{ secrets.GA_MESSUREMENT_ID }}
          OFFICIAL_WEBSITE_ORIGIN: ${{ secrets.OFFICIAL_WEBSITE_ORIGIN }}
          APP_CONSOLE_ORIGIN: ${{ secrets.APP_CONSOLE_ORIGIN }}
          COOKIE_SESSION_DOMAIN: ${{ secrets.COOKIE_SESSION_DOMAIN }}
          SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
        run: |
          set -euo pipefail
          revision_suffix="$(date -u +%Y%m%d-%H%M%S)-${{ needs.build.outputs.short_sha }}"
          env_vars=()
          for name in \
            PADDLE_ENVIRONMENT \
            PADDLE_SANDBOX_PRODUCT_ID PADDLE_SANDBOX_CURRENCY PADDLE_SANDBOX_UNIT_PRICE PADDLE_SANDBOX_MIN_TOPUP \
            PADDLE_SANDBOX_API_KEY PADDLE_SANDBOX_CLIENT_TOKEN PADDLE_SANDBOX_WEBHOOK_SECRET \
            PADDLE_LIVE_PRODUCT_ID PADDLE_LIVE_CURRENCY PADDLE_LIVE_UNIT_PRICE PADDLE_LIVE_MIN_TOPUP \
            PADDLE_LIVE_API_KEY PADDLE_LIVE_CLIENT_TOKEN PADDLE_LIVE_WEBHOOK_SECRET \
            GA_MEASURE_PROTOCOL_API_SECRET GA_MESSUREMENT_ID \
            OFFICIAL_WEBSITE_ORIGIN APP_CONSOLE_ORIGIN COOKIE_SESSION_DOMAIN SESSION_COOKIE_SECURE \
            NODE_TYPE APP_ROLE; do
            value="${!name:-}"
            if [[ -n "${value}" ]]; then
              env_vars+=("${name}=${value}")
            fi
          done
          env_args=()
          if (( ${#env_vars[@]} > 0 )); then
            IFS=,
            env_args=(--update-env-vars="${env_vars[*]}")
            unset IFS
          fi
          container_args=()
          container_names="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(template.containers[].name)')"
          if printf '%s\n' "${container_names}" | tr ';[:space:]' '\n' | grep -qx "app"; then
            container_args=(--container=app)
            echo "Deploying image/env to named container: app"
          else
            echo "No app container name found; deploying as a single-container service."
          fi
          gcloud run services update "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --revision-suffix="${revision_suffix}" \
            --no-traffic \
            --quiet \
            "${container_args[@]}" \
            --image="${{ needs.build.outputs.image_ref }}" \
            "${env_args[@]}"
          new_rev="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.latestCreatedRevisionName)')"
          echo "new_revision=${new_rev}" >> "$GITHUB_OUTPUT"
          echo "Deployed revision: ${new_rev}"

      - name: Health check the new revision
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --update-tags=canary="${{ steps.deploy.outputs.new_revision }}" \
            --quiet
          tag_url="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.traffic[].url)' | tr ';' '\n' | grep canary || true)"
          if [[ -z "${tag_url}" ]]; then
            echo "Failed to resolve canary tag URL for ${RUN_SERVICE}; refusing to probe a shared production hostname." >&2
            exit 1
          fi
          echo "Probing ${tag_url}/api/status ..."
          for i in $(seq 1 30); do
            code=$(curl -sS -o /tmp/status.json -w '%{http_code}' "${tag_url}/api/status" || true)
            echo "attempt $i -> $code"
            if [[ "${code}" == "200" ]]; then break; fi
            sleep 5
          done
          [[ "${code}" == "200" ]] || { echo "Health check failed" >&2; exit 1; }
          .github/scripts/supplier-deploy-verify.sh status \
            deployment-binding/manifest_hash_payload.json deployment-binding/manifest_sha256.txt /tmp/status.json
          if [[ "${{ steps.console_preflight.outputs.control_plane_mode }}" == "bridge" ]]; then
            .github/scripts/supplier-deploy-verify.sh control-plane-capabilities \
              /tmp/status.json /tmp/current-accounting.json 1 1
          else
            .github/scripts/supplier-deploy-verify.sh capabilities /tmp/status.json 1
            .github/scripts/supplier-deploy-verify.sh admin-schema-capabilities /tmp/status.json 1
          fi
          deployed_digest="$(gcloud run revisions describe "${{ steps.deploy.outputs.new_revision }}" \
            --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.imageDigest)')"
          .github/scripts/supplier-deploy-verify.sh oci "${{ needs.build.outputs.oci_digest }}" "${deployed_digest}"
          .github/scripts/supplier-deploy-verify.sh binding-verify deployment-binding/binding.json \
            "${{ needs.build.outputs.oci_digest }}" "${{ needs.build.outputs.manifest_sha256 }}"

      - name: Promote to 100% and verify fixed Console origin
        env:
          ROOT_ACCESS_TOKEN: ${{ secrets.SUPPLIER_DEPLOY_ROOT_ACCESS_TOKEN }}
          ROOT_USER_ID: ${{ vars.SUPPLIER_DEPLOY_ROOT_USER_ID }}
          CONTROL_PLANE_URL: https://console.flatkey.ai
        run: |
          set -euo pipefail
          rollback_on_error() {
            rc=$?
            trap - ERR
            echo "Fixed-origin post-promotion verification failed; restoring ${PREVIOUS_REVISION}." >&2
            gcloud run services update-traffic "${RUN_SERVICE}" \
              --project="${PROJECT_ID}" --region="${REGION}" \
              --to-revisions="${PREVIOUS_REVISION}=100" --quiet || \
              echo "Automatic Console rollback failed; operator intervention is required." >&2
            exit "${rc}"
          }
          PREVIOUS_REVISION="${{ steps.console_preflight.outputs.previous_revision }}"
          [[ -n "${PREVIOUS_REVISION}" ]] || { echo "previous Console revision is unavailable" >&2; exit 1; }
          trap rollback_on_error ERR
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --to-revisions="${{ steps.deploy.outputs.new_revision }}=100" \
            --quiet
          for attempt in $(seq 1 30); do
            code="$(curl -sS -o /tmp/fixed-origin-status.json -w '%{http_code}' "${CONTROL_PLANE_URL}/api/status" || true)"
            if [[ "${code}" == "200" ]] && \
              .github/scripts/supplier-deploy-verify.sh status \
                deployment-binding/manifest_hash_payload.json deployment-binding/manifest_sha256.txt \
                /tmp/fixed-origin-status.json; then
              break
            fi
            [[ "${attempt}" -lt 30 ]] || { echo "fixed Console origin did not serve the promoted manifest" >&2; false; }
            sleep 5
          done
          .github/scripts/supplier-deploy-verify.sh control-plane-fetch \
            "${CONTROL_PLANE_URL}" "${ROOT_ACCESS_TOKEN}" "${ROOT_USER_ID}" /tmp/fixed-origin-accounting.json
          .github/scripts/supplier-deploy-verify.sh control-plane-capabilities \
            /tmp/fixed-origin-status.json /tmp/fixed-origin-accounting.json 1 1
          jq -e '.success == true and .data.mutation.enabled == false' /tmp/fixed-origin-accounting.json >/dev/null || {
            echo "promoted Console mutation gate is not disabled" >&2; false;
          }
          readiness_code="$(curl -sS -o /tmp/fixed-origin-readiness.json -w '%{http_code}' \
            -H "Authorization: ${ROOT_ACCESS_TOKEN}" -H "New-Api-User: ${ROOT_USER_ID}" \
            "${CONTROL_PLANE_URL}/api/supply-chain/accounting/readiness" || true)"
          [[ "${readiness_code}" == "200" ]] || { echo "fixed Console accounting readiness failed" >&2; false; }
          jq -e '.success == true and .data.ready == true' /tmp/fixed-origin-readiness.json >/dev/null || {
            echo "promoted Console did not report accounting readiness" >&2; false;
          }
          trap - ERR

      - name: Drain old Console management requests
        run: |
          set -euo pipefail
          drain_seconds="${{ vars.SUPPLIER_MANAGEMENT_DRAIN_SECONDS || '3600' }}"
          [[ "${drain_seconds}" =~ ^[1-9][0-9]*$ ]] || { echo "invalid drain barrier" >&2; exit 1; }
          (( drain_seconds >= 3600 )) || { echo "management drain barrier must be at least 3600 seconds" >&2; exit 1; }
          sleep "${drain_seconds}"
          echo "Old-revision management request hard-timeout barrier elapsed. Mutation gate remains operator-enabled by expected-version CAS only."

      - name: Summary
        run: |
          echo "### Console deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`${RUN_SERVICE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node type: \`${NODE_TYPE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- App role: \`${APP_ROLE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Revision: \`${{ steps.deploy.outputs.new_revision }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"

  deploy-router:
    name: deploy router
    if: >-
      always() &&
      !cancelled() &&
      needs.build.result == 'success' &&
      (
        (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'router') ||
        (
          needs.deploy-console.result == 'success' &&
          (
            github.event_name == 'push' ||
            (github.event_name == 'workflow_dispatch' && inputs.deploy_target == 'both')
          )
        )
      )
    needs: [build, deploy-console]
    runs-on: ubuntu-latest
    environment: production-router
    env:
      RUN_SERVICE: newapi-router
      NODE_TYPE: slave
      APP_ROLE: router
      # Keep in sync with deploy/gcp/envs/prod/terraform.tfvars.
      MAX_INSTANCES: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528088078482/locations/global/workloadIdentityPools/github-prod-app-deploy/providers/github
          service_account: newapi-prod-router-deployer@vocai-gemini-prod.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Download immutable build evidence
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.binding_artifact }}
          path: deployment-binding

      - name: Deploy new revision with NO traffic
        id: deploy
        env:
          PADDLE_ENVIRONMENT: ${{ vars.PADDLE_ENVIRONMENT }}
          PADDLE_SANDBOX_PRODUCT_ID: ${{ vars.PADDLE_SANDBOX_PRODUCT_ID }}
          PADDLE_SANDBOX_CURRENCY: ${{ vars.PADDLE_SANDBOX_CURRENCY }}
          PADDLE_SANDBOX_UNIT_PRICE: ${{ vars.PADDLE_SANDBOX_UNIT_PRICE }}
          PADDLE_SANDBOX_MIN_TOPUP: ${{ vars.PADDLE_SANDBOX_MIN_TOPUP }}
          PADDLE_SANDBOX_API_KEY: ${{ secrets.PADDLE_SANDBOX_API_KEY }}
          PADDLE_SANDBOX_CLIENT_TOKEN: ${{ secrets.PADDLE_SANDBOX_CLIENT_TOKEN }}
          PADDLE_SANDBOX_WEBHOOK_SECRET: ${{ secrets.PADDLE_SANDBOX_WEBHOOK_SECRET }}
          PADDLE_LIVE_PRODUCT_ID: ${{ vars.PADDLE_LIVE_PRODUCT_ID }}
          PADDLE_LIVE_CURRENCY: ${{ vars.PADDLE_LIVE_CURRENCY }}
          PADDLE_LIVE_UNIT_PRICE: ${{ vars.PADDLE_LIVE_UNIT_PRICE }}
          PADDLE_LIVE_MIN_TOPUP: ${{ vars.PADDLE_LIVE_MIN_TOPUP }}
          PADDLE_LIVE_API_KEY: ${{ secrets.PADDLE_LIVE_API_KEY }}
          PADDLE_LIVE_CLIENT_TOKEN: ${{ secrets.PADDLE_LIVE_CLIENT_TOKEN }}
          PADDLE_LIVE_WEBHOOK_SECRET: ${{ secrets.PADDLE_LIVE_WEBHOOK_SECRET }}
          GA_MEASURE_PROTOCOL_API_SECRET: ${{ secrets.GA_MEASURE_PROTOCOL_API_SECRET }}
          GA_MESSUREMENT_ID: ${{ secrets.GA_MESSUREMENT_ID }}
          OFFICIAL_WEBSITE_ORIGIN: ${{ secrets.OFFICIAL_WEBSITE_ORIGIN }}
          APP_CONSOLE_ORIGIN: ${{ secrets.APP_CONSOLE_ORIGIN }}
          COOKIE_SESSION_DOMAIN: ${{ secrets.COOKIE_SESSION_DOMAIN }}
          SESSION_COOKIE_SECURE: ${{ secrets.SESSION_COOKIE_SECURE }}
        run: |
          set -euo pipefail
          revision_suffix="$(date -u +%Y%m%d-%H%M%S)-${{ needs.build.outputs.short_sha }}"
          env_vars=()
          for name in \
            PADDLE_ENVIRONMENT \
            PADDLE_SANDBOX_PRODUCT_ID PADDLE_SANDBOX_CURRENCY PADDLE_SANDBOX_UNIT_PRICE PADDLE_SANDBOX_MIN_TOPUP \
            PADDLE_SANDBOX_API_KEY PADDLE_SANDBOX_CLIENT_TOKEN PADDLE_SANDBOX_WEBHOOK_SECRET \
            PADDLE_LIVE_PRODUCT_ID PADDLE_LIVE_CURRENCY PADDLE_LIVE_UNIT_PRICE PADDLE_LIVE_MIN_TOPUP \
            PADDLE_LIVE_API_KEY PADDLE_LIVE_CLIENT_TOKEN PADDLE_LIVE_WEBHOOK_SECRET \
            GA_MEASURE_PROTOCOL_API_SECRET GA_MESSUREMENT_ID \
            OFFICIAL_WEBSITE_ORIGIN APP_CONSOLE_ORIGIN COOKIE_SESSION_DOMAIN SESSION_COOKIE_SECURE \
            NODE_TYPE APP_ROLE; do
            value="${!name:-}"
            if [[ -n "${value}" ]]; then
              env_vars+=("${name}=${value}")
            fi
          done
          env_args=()
          if (( ${#env_vars[@]} > 0 )); then
            IFS=,
            env_args=(--update-env-vars="${env_vars[*]}")
            unset IFS
          fi
          container_args=()
          container_names="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(template.containers[].name)')"
          if printf '%s\n' "${container_names}" | tr ';[:space:]' '\n' | grep -qx "app"; then
            container_args=(--container=app)
            echo "Deploying image/env to named container: app"
          else
            echo "No app container name found; deploying as a single-container service."
          fi
          gcloud run services update "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --max-instances="${MAX_INSTANCES}" \
            --revision-suffix="${revision_suffix}" \
            --no-traffic \
            --quiet \
            "${container_args[@]}" \
            --image="${{ needs.build.outputs.image_ref }}" \
            "${env_args[@]}"
          new_rev="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.latestCreatedRevisionName)')"
          echo "new_revision=${new_rev}" >> "$GITHUB_OUTPUT"
          echo "Deployed revision: ${new_rev}"

      - name: Health check the new revision
        env:
          APP_CONSOLE_ORIGIN: https://console.flatkey.ai
          ROOT_ACCESS_TOKEN: ${{ secrets.SUPPLIER_DEPLOY_ROOT_ACCESS_TOKEN }}
          ROOT_USER_ID: ${{ vars.SUPPLIER_DEPLOY_ROOT_USER_ID }}
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --update-tags=canary="${{ steps.deploy.outputs.new_revision }}" \
            --quiet
          tag_url="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.traffic[].url)' | tr ';' '\n' | grep canary || true)"
          if [[ -z "${tag_url}" ]]; then
            echo "Failed to resolve canary tag URL for ${RUN_SERVICE}; refusing to probe a shared production hostname." >&2
            exit 1
          fi
          echo "Probing ${tag_url}/api/status ..."
          for i in $(seq 1 30); do
            code=$(curl -sS -o /tmp/status.json -w '%{http_code}' "${tag_url}/api/status" || true)
            echo "attempt $i -> $code"
            if [[ "${code}" == "200" ]]; then break; fi
            sleep 5
          done
          [[ "${code}" == "200" ]] || { echo "Health check failed" >&2; exit 1; }
          .github/scripts/supplier-deploy-verify.sh status \
            deployment-binding/manifest_hash_payload.json deployment-binding/manifest_sha256.txt /tmp/status.json
          .github/scripts/supplier-deploy-verify.sh control-plane-fetch \
            "${APP_CONSOLE_ORIGIN}" "${ROOT_ACCESS_TOKEN}" "${ROOT_USER_ID}" /tmp/console-accounting.json
          .github/scripts/supplier-deploy-verify.sh control-plane-capabilities \
            /tmp/status.json /tmp/console-accounting.json 1 1
          deployed_digest="$(gcloud run revisions describe "${{ steps.deploy.outputs.new_revision }}" \
            --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.imageDigest)')"
          .github/scripts/supplier-deploy-verify.sh oci "${{ needs.build.outputs.oci_digest }}" "${deployed_digest}"
          .github/scripts/supplier-deploy-verify.sh binding-verify deployment-binding/binding.json \
            "${{ needs.build.outputs.oci_digest }}" "${{ needs.build.outputs.manifest_sha256 }}"

      - name: Canary 10% for 3 minutes
        run: |
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --to-revisions="${{ steps.deploy.outputs.new_revision }}=10" \
            --quiet
          echo "Sleeping 180s while canary observes traffic..."
          sleep 180

      - name: Promote to 100%
        run: |
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --to-revisions="${{ steps.deploy.outputs.new_revision }}=100" \
            --quiet

      - name: Summary
        run: |
          echo "### Router deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service: \`${RUN_SERVICE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Node type: \`${NODE_TYPE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- App role: \`${APP_ROLE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Revision: \`${{ steps.deploy.outputs.new_revision }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
