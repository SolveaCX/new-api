name: GCP Deploy Website Static (v2)

# Deploys the static marketing site (website-static/) to Cloud Run newapi-web,
# and guarantees the legacy Next.js site stays alive as newapi-website-legacy —
# it serves the entire historical SEO surface (blog, model pages, locale routes,
# landing pages, sitemap/robots) via nginx fallback proxy from the static site.
# Deploy is gated by the "production" GitHub Environment — requires approval.
#
# Notes:
# - Image is built on the runner and pushed to Artifact Registry (the CI deployer
#   SA has artifactregistry.writer but NOT Cloud Build permissions).
# - BLOGGER_ACCESS_KEY lives in Secret Manager (newapi-website-blogger-access-key),
#   mounted via --set-secrets. No GitHub Secret, no plaintext env var.
# - The CI deployer SA cannot change IAM policy; legacy service invoker binding
#   and secret accessor grants are owned out-of-band (see deploy/gcp/docs/OPERATIONS.md).

on:
  push:
    branches: [main]
    paths:
      - "website-static/**"
      - ".github/workflows/gcp-deploy-website-static.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID:  ${{ vars.GCP_PROJECT_ID }}
  REGION:      ${{ vars.GCP_REGION }}
  AR_REPO_URL: ${{ vars.GCP_AR_REPO_URL }}
  RUN_SERVICE: ${{ vars.GCP_WEB_RUN_SERVICE }}   # newapi-web
  LEGACY_SERVICE: newapi-website-legacy
  # Pinned pre-redesign production image (rollback anchor newapi-web-memory-1gi-20260715-103546)
  LEGACY_IMAGE_DIGEST: sha256:d6c4eac9b29556009f3d4133eb1cc5b7ba83211bdd82c08a5d0d129b8aa4c8c4
  LEGACY_SECRET: newapi-website-blogger-access-key
  RUNTIME_SA: newapi-web-runtime@vocai-gemini-prod.iam.gserviceaccount.com
  APP_CONSOLE_ORIGIN: ${{ vars.WEBSITE_APP_CONSOLE_ORIGIN }}
  ROUTER_ORIGIN:      ${{ vars.WEBSITE_ROUTER_ORIGIN }}
  SITE_ORIGIN:        ${{ vars.WEBSITE_SITE_ORIGIN }}
  COOKIE_SESSION_DOMAIN: ${{ secrets.COOKIE_SESSION_DOMAIN || '.flatkey.ai' }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit static website
        run: node website-static/audit.mjs

      - name: Regression test static website interactions
        run: node --test website-static/tests/*.test.mjs

      - name: Auth to GCP (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Ensure legacy SEO service (create or verify)
        run: |
          if ! gcloud run services describe "$LEGACY_SERVICE" --project "$PROJECT_ID" --region "$REGION" >/dev/null 2>&1; then
            gcloud run deploy "$LEGACY_SERVICE" \
              --project "$PROJECT_ID" --region "$REGION" \
              --image "$AR_REPO_URL/website@$LEGACY_IMAGE_DIGEST" \
              --port 4000 --memory 1Gi --cpu 1 --min-instances 1 --max-instances 4 \
              --service-account "$RUNTIME_SA" \
              --set-secrets "BLOGGER_ACCESS_KEY=$LEGACY_SECRET:latest" \
              --set-env-vars "NODE_ENV=production,TZ=UTC,APP_CONSOLE_ORIGIN=${APP_CONSOLE_ORIGIN},ROUTER_ORIGIN=${ROUTER_ORIGIN},SITE_ORIGIN=${SITE_ORIGIN},COOKIE_SESSION_DOMAIN=${COOKIE_SESSION_DOMAIN}"
            echo "NOTE: deployer SA cannot grant run.invoker; an operator must run:" \
                 "gcloud run services add-iam-policy-binding $LEGACY_SERVICE --member=allUsers --role=roles/run.invoker"
          fi
          # verify wiring regardless of create/exists path
          sa=$(gcloud run services describe "$LEGACY_SERVICE" --project "$PROJECT_ID" --region "$REGION" \
               --format="value(spec.template.spec.serviceAccountName)")
          [ "$sa" = "$RUNTIME_SA" ] || { echo "wrong service account: $sa"; exit 1; }
          gcloud run services describe "$LEGACY_SERVICE" --project "$PROJECT_ID" --region "$REGION" \
            --format="value(spec.template.spec.containers[0].env)" | grep -q "$LEGACY_SECRET" \
            || { echo "BLOGGER_ACCESS_KEY is not a Secret Manager reference"; exit 1; }

      - name: Smoke test legacy SEO surface
        run: |
          L="https://newapi-website-legacy-5qjldqffdq-uw.a.run.app"
          for p in blog zh models pricing gpt-api-alternative about sitemap.xml; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 "$L/$p")
            echo "/$p -> $code"
            case "$code" in 200|301|302|308) ;; *) echo "legacy smoke failed (403 = missing allUsers invoker binding)"; exit 1 ;; esac
          done

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build & push image
        run: |
          short_sha="${GITHUB_SHA::12}"
          IMAGE="$AR_REPO_URL/website-static:sha-$short_sha"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          docker build -t "$IMAGE" website-static
          docker push "$IMAGE"

      - name: Deploy canary (no traffic)
        run: |
          gcloud run deploy "$RUN_SERVICE" --project "$PROJECT_ID" --region "$REGION" \
            --image "$IMAGE" --no-traffic --tag canary --port 8080 \
            --update-env-vars "APP_CONSOLE_ORIGIN=${APP_CONSOLE_ORIGIN}"

      - name: Assert liveness probe targets 8080 (before traffic shift)
        run: |
          port=$(gcloud run services describe "$RUN_SERVICE" --project "$PROJECT_ID" --region "$REGION" \
                 --format="value(spec.template.spec.containers[0].livenessProbe.httpGet.port)")
          echo "liveness probe port: ${port:-none}"
          if [ -n "$port" ] && [ "$port" != "8080" ]; then
            echo "stale liveness probe ($port); fix with:" \
                 "gcloud run services update $RUN_SERVICE --liveness-probe=httpGet.path=/,httpGet.port=8080,periodSeconds=30,timeoutSeconds=5,failureThreshold=3"
            exit 1
          fi

      - name: Smoke test canary
        run: |
          C="https://canary---newapi-web-5qjldqffdq-uw.a.run.app"
          # canonical static pages and assets
          for p in "" models docs playground pricing compute usecases contact status terms privacy refund-policy sla about zh/about careers zh/careers install.sh llms.txt assets/team/amazon-accelerate-team.jpg assets/team/team-dinner.jpg; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/$p")
            echo "/$p -> $code"; [ "$code" = "200" ] || exit 1
          done
          # Every historical .html page permanently consolidates into one clean
          # canonical URL instead of returning a second indexable 200.
          for pair in "models.html models" "docs.html docs" "playground.html playground" "topup.html pricing" "compute.html compute" "terms.html terms" "about.html about" "careers.html careers" "about-zh.html zh/about" "careers-zh.html zh/careers"; do
            set -- $pair
            curl -s -o /dev/null -w "%{http_code} %{redirect_url}" -m 20 "$C/$1" | grep -q "^301 $C/$2$" || { echo "/$1 redirect broken"; exit 1; }
          done
          # Auth entry points collapse to the single console auth screen (dedupe): 301/302, not 200.
          curl -s -o /dev/null -w "%{http_code}" "$C/signup.html" | grep -q 301 || exit 1
          curl -s -o /dev/null -w "%{http_code}" "$C/login.html" | grep -q 301 || exit 1
          curl -s -o /dev/null -w "%{http_code}" "$C/login" | grep -q 302 || exit 1
          # compute B2B landing: pretty route serves the page, SEO head + lead form present
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/compute"); echo "/compute -> $code"; [ "$code" = "200" ] || exit 1
          curl -s -m 20 "$C/compute" | grep -q 'canonical" href="https://flatkey.ai/compute"' || { echo "compute canonical missing"; exit 1; }
          curl -s -m 20 "$C/compute" | grep -q 'id="waitlist"' || { echo "compute waitlist form missing"; exit 1; }
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/about"); echo "/about -> $code"; [ "$code" = "200" ] || exit 1
          curl -s -m 20 "$C/about" | grep -q 'Hunter Guo' || { echo "new About founder story missing"; exit 1; }
          curl -s -m 20 "$C/about" | grep -q 'assets/team/amazon-accelerate-team.jpg' || { echo "About team photos missing"; exit 1; }
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/zh/about"); echo "/zh/about -> $code"; [ "$code" = "200" ] || exit 1
          curl -s -m 20 "$C/zh/about" | grep -q '让每个人都能更简单地使用 AI' || { echo "localized About story missing"; exit 1; }
          for p in careers zh/careers; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/$p"); echo "/$p -> $code"; [ "$code" = "200" ] || exit 1
            curl -s -m 20 "$C/$p" | grep -q 'assets/team/seattle-community.jpg' || { echo "/$p team photos missing"; exit 1; }
          done
          # Common singular career links must permanently redirect to the
          # canonical plural pages instead of falling through to legacy 404s.
          curl -s -o /dev/null -w "%{http_code} %{redirect_url}" -m 20 "$C/career" | grep -q "^301 $C/careers$" || { echo "/career redirect broken"; exit 1; }
          curl -s -o /dev/null -w "%{http_code} %{redirect_url}" -m 20 "$C/zh/career" | grep -q "^301 $C/zh/careers$" || { echo "/zh/career redirect broken"; exit 1; }
          curl -s -m 10 "$C/api/status" | grep -Eq '"success"[[:space:]]*:[[:space:]]*true' \
            || { echo "public status proxy unavailable"; exit 1; }
          # legacy SEO surface through the fallback proxy (must be 200, not redirect/404)
          for p in blog zh models pricing gpt-api-alternative rankings sitemap.xml robots.txt; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 "$C/$p")
            echo "/$p -> $code"; [ "$code" = "200" ] || exit 1
          done
          # blog must NOT redirect to homepage anymore
          loc=$(curl -s -o /dev/null -w "%{redirect_url}" -m 30 "$C/blog")
          [ -z "$loc" ] || { echo "unexpected redirect: /blog -> $loc"; exit 1; }
          curl -s -m 30 "$C/blog" | grep -q 'href="/blog/category/' || { echo "blog category links missing"; exit 1; }
          curl -s -m 30 "$C/blog" | grep -q 'href="/blog/[^c]' || { echo "blog article links missing"; exit 1; }
          # merged sitemap: index + legacy inventory + v2 pages
          curl -s -m 30 "$C/sitemap.xml" | grep -q "<sitemapindex" || { echo "sitemap index missing"; exit 1; }
          curl -s -m 30 "$C/sitemap-site.xml" | grep -q "<urlset" || { echo "legacy sitemap proxy broken"; exit 1; }
          curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/sitemap-v2.xml" | grep -q 200 || exit 1
          curl -s -m 30 "$C/sitemap-site.xml" | grep -q 'hreflang="en-US"' || { echo "legacy sitemap regional hreflang missing"; exit 1; }
          curl -s -m 20 "$C/sitemap-v2.xml" | grep -q '\.html<' && { echo "v2 sitemap exposes .html URLs"; exit 1; }
          # legacy skin must be injected into proxied pages
          curl -s -m 30 "$C/blog" | grep -q "legacy-skin.css" || { echo "legacy skin not injected"; exit 1; }
          curl -s -m 30 "$C/zh/terms" | grep -q '>flatkey.ai</span>' || { echo "legacy SSR wordmark was mutated; React hydration would fail"; exit 1; }
          curl -s -o /dev/null -w "%{http_code}" -m 20 "$C/assets/legacy-skin.css" | grep -q 200 || exit 1
          # v2 mark must override the legacy logo path (static file, not proxied)
          curl -s -m 20 "$C/flatkey-mark.svg" | grep -qi "<svg" || { echo "mark override missing"; exit 1; }
          # localized homepages + SEO heads
          curl -s -m 20 "$C/zh" | grep -q 'lang="zh-CN"' || { echo "/zh not localized static"; exit 1; }
          curl -s -m 20 "$C/zh" | grep -q 'canonical" href="https://flatkey.ai/zh"' || { echo "/zh canonical missing"; exit 1; }
          curl -s -m 20 "$C/ja" | grep -q 'lang="ja-JP"' || { echo "/ja not localized"; exit 1; }
          curl -s -m 20 "$C/zh/terms" | grep -q 'lang="zh-CN"' || { echo "legacy localized lang normalization missing"; exit 1; }
          curl -s -m 20 "$C/" | grep -q 'hreflang="en-US"' || { echo "regional hreflang cluster missing"; exit 1; }
          curl -s -m 20 "$C/" | grep -q 'hreflang="zh-CN"' || { echo "hreflang cluster missing"; exit 1; }
          curl -s -m 20 "$C/" | grep -q 'og:image' || { echo "og tags missing"; exit 1; }
          curl -s -m 20 "$C/docs" | grep -q 'canonical" href="https://flatkey.ai/docs"' || { echo "docs canonical missing"; exit 1; }
          curl -s -m 20 "$C/contact" | grep -q 'class="nav"' || { echo "contact nav missing"; exit 1; }
          # slim footer legal links must be real anchors; assets must be version-busted
          curl -s -m 20 "$C/terms" | grep -q 'href="/sla">' || { echo "footer legal links not canonical"; exit 1; }
          curl -s -m 20 "$C/terms" | grep -q 'hreflang="zh-CN" href="https://flatkey.ai/zh/terms"' || { echo "terms hreflang missing"; exit 1; }
          curl -s -m 20 "$C/assets/i18n.js?v=720e" | grep -q 'location.replace("/" + legalLanguage' || { echo "saved-language legal redirect missing"; exit 1; }
          curl -s -m 20 "$C/assets/i18n.js?v=720e" | grep -q 'locale === "zh" ? "/zh/careers" : "/careers"' || { echo "locale-aware Careers route missing"; exit 1; }
          curl -s -m 20 "$C/assets/site-shell.js?v=720a" | grep -q 'flatkey:languagechange' || { echo "locale-aware mobile navigation missing"; exit 1; }
          curl -s -m 20 "$C/" | grep -q 'i18n.js?v=' || { echo "asset versioning missing"; exit 1; }
          code=$(curl -s -o /dev/null -w "%{http_code}" -m 30 "$C/ja/terms"); [ "$code" = "200" ] || { echo "/ja/terms -> $code"; exit 1; }
          # media price calibration + conversion tracking
          curl -s -m 20 "$C/" | grep -q 'md.early' || { echo "media calibration missing"; exit 1; }
          curl -s -m 20 "$C/" | grep -qE '\$0\.[0-9]+/s' && { echo "fabricated per-second price still present"; exit 1; }
          curl -s -m 20 "$C/assets/track.js?v=721a" | grep -q 'sign_up_click' || { echo "track.js missing"; exit 1; }
          curl -s -m 20 "$C/assets/track.js?v=721a" | grep -q 'first_landing_path' || { echo "track.js attribution missing"; exit 1; }
          # pricing honesty: no legacy fake claims may reappear
          for bad in "60–90%" "50% of list" "53% of list"; do
            curl -s -m 20 "$C/" | grep -q "$bad" && { echo "fake claim present: $bad"; exit 1; }
          done
          curl -s -m 20 "$C/" | grep -q '\$3.33' || { echo "real plg price missing"; exit 1; }

      - name: Shift traffic to latest
        run: |
          gcloud run services update-traffic "$RUN_SERVICE" \
            --project "$PROJECT_ID" --region "$REGION" --to-latest
