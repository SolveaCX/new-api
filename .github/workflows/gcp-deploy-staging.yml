name: GCP Deploy Staging (backend)

# Staging 后端自动部署：push 到 staging 分支即自动 build + deploy 到 newapi-staging。
# 与生产 gcp-deploy.yml 隔离：触发分支 staging、镜像 tag staging-*、服务名写死 newapi-staging。
# 按方案决策：staging 不挂人工审批（推了就自动上）。生产 main 的审批不受影响。

on:
  push:
    branches: [staging]
    # 官网单独由 gcp-deploy-website-staging.yml 处理；纯官网改动跳过后端部署。
    paths-ignore:
      - 'website/**'
      - '.github/workflows/gcp-deploy-website-staging.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image tag to deploy (skip build). Format: staging-sha-<commit>"
        required: false
        type: string

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}
  AR_REPO_URL: ${{ vars.GCP_AR_REPO_URL }}
  RUN_SERVICE: newapi-staging
  # Staging console 内部“回官网”链接必须指向 staging website，不能串生产 flatkey.ai。
  STAGING_OFFICIAL_WEBSITE_ORIGIN: ${{ vars.STAGING_OFFICIAL_WEBSITE_ORIGIN || 'https://staging-website.flatkey.ai' }}
  STAGING_APP_CONSOLE_ORIGIN: ${{ vars.STAGING_APP_CONSOLE_ORIGIN || 'https://staging-console.flatkey.ai' }}
  STAGING_COOKIE_SESSION_DOMAIN: ${{ vars.STAGING_COOKIE_SESSION_DOMAIN || '' }}
  STAGING_SESSION_COOKIE_SECURE: ${{ vars.STAGING_SESSION_COOKIE_SECURE || 'true' }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.compute_image.outputs.image_uri }}
      image_ref: ${{ steps.resolve_image.outputs.image_ref }}
      oci_digest: ${{ steps.resolve_image.outputs.oci_digest }}
      manifest_sha256: ${{ steps.manifest.outputs.manifest_sha256 }}
      binding_artifact: ${{ steps.binding.outputs.artifact_name }}
      short_sha: ${{ steps.compute_image.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image URI
        id: compute_image
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "Tag-only staging deploy has no immutable manifest/OCI binding and is disabled." >&2
            exit 1
          fi
          echo "image_uri=${AR_REPO_URL}/server:staging-sha-${short_sha}" >> "$GITHUB_OUTPUT"

      - name: Generate canonical build manifest
        id: manifest
        run: |
          set -euo pipefail
          .github/scripts/supplier-build-manifest.sh build-manifest \
            "${GITHUB_REPOSITORY}" "${GITHUB_SHA}" "${GITHUB_RUN_ID}" "${GITHUB_RUN_ATTEMPT}" \
            "gcp-deploy-staging-build" "1" "1"
          .github/scripts/supplier-deploy-verify.sh manifest build-manifest/manifest_hash_payload.json build-manifest/manifest_sha256.txt
          echo "manifest_sha256=$(cat build-manifest/manifest_sha256.txt)" >> "$GITHUB_OUTPUT"

      - name: Compute cookie domain
        id: compute_cookie_domain
        run: |
          set -euo pipefail
          host="${STAGING_APP_CONSOLE_ORIGIN#http://}"
          host="${host#https://}"
          host="${host%%/*}"
          cookie_domain=""
          configured_domain="${STAGING_COOKIE_SESSION_DOMAIN:-}"
          if [[ -n "${configured_domain}" ]]; then
            match_domain="${configured_domain#.}"
            if [[ "${host}" == "${match_domain}" || "${host}" == *."${match_domain}" ]]; then
              cookie_domain="${configured_domain}"
            fi
          elif [[ "${host}" == "flatkey.ai" || "${host}" == *.flatkey.ai ]]; then
            cookie_domain=".flatkey.ai"
          fi
          echo "cookie_domain=${cookie_domain}" >> "$GITHUB_OUTPUT"

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528088078482/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: newapi-ci-deployer@vocai-gemini-prod.iam.gserviceaccount.com

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VITE_OFFICIAL_WEBSITE_ORIGIN=${{ env.STAGING_OFFICIAL_WEBSITE_ORIGIN }}
            VITE_COOKIE_SESSION_DOMAIN=${{ steps.compute_cookie_domain.outputs.cookie_domain }}
            BUILD_REPO=${{ github.repository }}
            BUILD_COMMIT=${{ github.sha }}
            GITHUB_RUN_ID=${{ github.run_id }}
            RUN_ATTEMPT=${{ github.run_attempt }}
            BUILD_JOB_IDENTITY=gcp-deploy-staging-build
          tags: |
            ${{ steps.compute_image.outputs.image_uri }}
            ${{ env.AR_REPO_URL }}/server:staging-latest
          cache-from: type=gha,scope=staging
          cache-to: type=gha,mode=max,scope=staging,ignore-error=true

      - name: Resolve immutable image
        id: resolve_image
        run: |
          set -euo pipefail
          digest="${{ steps.push.outputs.digest }}"
          .github/scripts/supplier-deploy-verify.sh oci "${digest}" "${digest}"
          echo "oci_digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${AR_REPO_URL}/server@${digest}" >> "$GITHUB_OUTPUT"

      - name: Create immutable staging binding
        id: binding
        run: |
          set -euo pipefail
          artifact_name="supplier-staging-binding-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          mkdir -p deployment-binding
          .github/scripts/supplier-deploy-verify.sh binding-write \
            "${{ steps.resolve_image.outputs.oci_digest }}" "${{ steps.manifest.outputs.manifest_sha256 }}" deployment-binding/binding.json
          cp build-manifest/manifest_hash_payload.json build-manifest/manifest_sha256.txt deployment-binding/
          echo "artifact_name=${artifact_name}" >> "$GITHUB_OUTPUT"

      - name: Retain immutable staging binding
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.binding.outputs.artifact_name }}
          path: deployment-binding/
          if-no-files-found: error
          retention-days: 90

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # 无 environment：staging 不挂人工审批（按方案决策点 2）
    steps:
      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/528088078482/locations/global/workloadIdentityPools/github-staging-deploy/providers/github
          service_account: newapi-staging-deployer@vocai-gemini-prod.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download immutable build evidence
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.binding_artifact }}
          path: deployment-binding

      - name: Deploy new revision with no traffic
        id: deploy
        run: |
          set -euo pipefail
          revision_suffix="$(date -u +%Y%m%d-%H%M%S)-${{ needs.build.outputs.short_sha }}"
          host="${STAGING_APP_CONSOLE_ORIGIN#http://}"
          host="${host#https://}"
          host="${host%%/*}"
          effective_cookie_domain=""
          configured_domain="${STAGING_COOKIE_SESSION_DOMAIN:-}"
          if [[ -n "${configured_domain}" ]]; then
            match_domain="${configured_domain#.}"
            if [[ "${host}" == "${match_domain}" || "${host}" == *."${match_domain}" ]]; then
              effective_cookie_domain="${configured_domain}"
            fi
          elif [[ "${host}" == "flatkey.ai" || "${host}" == *.flatkey.ai ]]; then
            effective_cookie_domain=".flatkey.ai"
          fi
          env_vars=(
            "OFFICIAL_WEBSITE_ORIGIN=${STAGING_OFFICIAL_WEBSITE_ORIGIN}"
            "APP_CONSOLE_ORIGIN=${STAGING_APP_CONSOLE_ORIGIN}"
            "COOKIE_SESSION_DOMAIN=${effective_cookie_domain}"
            "SESSION_COOKIE_SECURE=${STAGING_SESSION_COOKIE_SECURE}"
          )
          IFS=,
          env_arg="${env_vars[*]}"
          unset IFS
          gcloud run services update "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build.outputs.image_ref }}" \
            --update-env-vars="${env_arg}" \
            --revision-suffix="${revision_suffix}" \
            --no-traffic \
            --quiet
          new_rev="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.latestCreatedRevisionName)')"
          echo "new_revision=${new_rev}" >> "$GITHUB_OUTPUT"
          echo "Deployed revision: ${new_rev}"

      - name: Verify tagged staging revision
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${RUN_SERVICE}" --project="${PROJECT_ID}" --region="${REGION}" \
            --update-tags=supplier-preflight="${{ steps.deploy.outputs.new_revision }}" --quiet
          url="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.traffic[].url)' | tr ';' '\n' | grep supplier-preflight || true)"
          if [[ -z "${url}" ]]; then
            echo "Could not resolve Cloud Run service URL" >&2
            exit 1
          fi
          echo "Probing ${url}/api/status ..."
          for i in $(seq 1 30); do
            code=$(curl -sS -o /tmp/status.json -w '%{http_code}' "${url}/api/status" || true)
            echo "attempt $i → $code"
            if [[ "${code}" == "200" ]]; then break; fi
            sleep 5
          done
          [[ "${code}" == "200" ]] || { echo "Health check failed" >&2; exit 1; }
          .github/scripts/supplier-deploy-verify.sh status deployment-binding/manifest_hash_payload.json deployment-binding/manifest_sha256.txt /tmp/status.json
          .github/scripts/supplier-deploy-verify.sh capabilities /tmp/status.json 1
          deployed_digest="$(gcloud run revisions describe "${{ steps.deploy.outputs.new_revision }}" \
            --project="${PROJECT_ID}" --region="${REGION}" --format='value(status.imageDigest)')"
          .github/scripts/supplier-deploy-verify.sh oci "${{ needs.build.outputs.oci_digest }}" "${deployed_digest}"
          .github/scripts/supplier-deploy-verify.sh binding-verify deployment-binding/binding.json \
            "${{ needs.build.outputs.oci_digest }}" "${{ needs.build.outputs.manifest_sha256 }}"

      - name: Promote verified staging revision to 100%
        run: |
          gcloud run services update-traffic "${RUN_SERVICE}" --project="${PROJECT_ID}" --region="${REGION}" \
            --to-revisions="${{ steps.deploy.outputs.new_revision }}=100" --quiet

      - name: Summary
        run: |
          url="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.url)')"
          echo "### Staging backend deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service:  \`${RUN_SERVICE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Revision: \`${{ steps.deploy.outputs.new_revision }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image:    \`${{ needs.build.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL:      ${url}" >> "$GITHUB_STEP_SUMMARY"
