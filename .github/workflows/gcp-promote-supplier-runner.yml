name: GCP Promote Supplier Runner

on:
  workflow_dispatch:
    inputs:
      console_revision:
        description: "Finalized Console revision already serving 100%"
        required: true
        type: string
      binding_run_id:
        description: "GitHub Actions run ID containing the immutable deployment binding"
        required: true
        type: string
      binding_artifact:
        description: "Immutable supplier-deployment-binding-* artifact name"
        required: true
        type: string

permissions:
  contents: read
  actions: read
  id-token: write

jobs:
  promote-runner:
    runs-on: ubuntu-latest
    environment: production
    env:
      JOB_NAME: newapi-supplier-batch
      PROJECT_NUMBER: "528088078482"
      RUNNER_SERVICE_ACCOUNT: newapi-supplier-batch-runner@vocai-gemini-prod.iam.gserviceaccount.com
      EXPECTED_CONSOLE_URL: https://console.flatkey.ai
      EXPECTED_POLL_INTERVAL: 5s
    steps:
      - name: Checkout verification scripts
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4.4.0

      - name: Download immutable deployment binding
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: ${{ inputs.binding_artifact }}
          path: deployment-binding
          repository: ${{ github.repository }}
          run-id: ${{ inputs.binding_run_id }}
          github-token: ${{ github.token }}

      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2.1.13
        with:
          workload_identity_provider: projects/528088078482/locations/global/workloadIdentityPools/github-supplier-promote/providers/github
          service_account: newapi-supplier-promoter@vocai-gemini-prod.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2.2.1

      - name: Verify finalized Console, manifest, OCI binding, and capabilities
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          CONSOLE_REVISION: ${{ inputs.console_revision }}
          ROOT_ACCESS_TOKEN: ${{ secrets.SUPPLIER_DEPLOY_ROOT_ACCESS_TOKEN }}
          ROOT_USER_ID: ${{ vars.SUPPLIER_DEPLOY_ROOT_USER_ID }}
          CONTROL_PLANE_URL: https://console.flatkey.ai
        run: |
          set -euo pipefail
          gcloud run jobs describe "${JOB_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --format=json >/tmp/supplier-job.json
          .github/scripts/supplier-resource-association-verify.sh job \
            /tmp/supplier-job.json "${PROJECT_ID}" "${PROJECT_NUMBER}" "${REGION}" "${JOB_NAME}" \
            "${RUNNER_SERVICE_ACCOUNT}" "${EXPECTED_CONSOLE_URL}" "${EXPECTED_POLL_INTERVAL}"
          gcloud run revisions describe "${CONSOLE_REVISION}" --project="${PROJECT_ID}" --region="${REGION}" --format=json >/tmp/target-revision.json
          gcloud run services describe newapi-console --project="${PROJECT_ID}" --region="${REGION}" --format=json >/tmp/console-service.json
          jq -e --arg revision "${CONSOLE_REVISION}" '
            ([.status.traffic[] | select((.percent // 0) > 0)] | length == 1) and
            any(.status.traffic[]; .revisionName == $revision and .percent == 100)
          ' /tmp/console-service.json >/dev/null || { echo "target Console revision is not the sole 100% traffic revision" >&2; exit 1; }

          [[ -n "${ROOT_ACCESS_TOKEN}" && -n "${ROOT_USER_ID}" && -n "${CONTROL_PLANE_URL}" ]] || {
            echo "authenticated Console control-plane inputs are unavailable" >&2; exit 1;
          }
          auth=(-H "Authorization: ${ROOT_ACCESS_TOKEN}" -H "New-Api-User: ${ROOT_USER_ID}")
          curl --fail --silent --show-error "${auth[@]}" "${CONTROL_PLANE_URL%/}/api/status" >/tmp/status.json
          curl --fail --silent --show-error "${auth[@]}" "${CONTROL_PLANE_URL%/}/api/supply-chain/accounting/status" >/tmp/accounting.json
          curl --fail --silent --show-error "${auth[@]}" "${CONTROL_PLANE_URL%/}/api/supply-chain/accounting/readiness" >/tmp/readiness.json
          jq -e '.success == true and .data.mutation.enabled == false and .data.admin_command_ledger_state == "finalized"' /tmp/accounting.json >/dev/null || {
            echo "mutation gate must be disabled and admin command ledger must be finalized" >&2; exit 1;
          }
          jq -e '.success == true and .data.ready == true and .data.status.admin_command_ledger_state == "finalized"' /tmp/readiness.json >/dev/null || {
            echo "authenticated accounting readiness/finalization preflight failed" >&2; exit 1;
          }

          .github/scripts/supplier-deploy-verify.sh status deployment-binding/manifest_hash_payload.json deployment-binding/manifest_sha256.txt /tmp/status.json
          .github/scripts/supplier-deploy-verify.sh control-plane-capabilities \
            /tmp/status.json /tmp/accounting.json 1 1
          digest="$(jq -er '.status.imageDigest' /tmp/target-revision.json)"
          manifest_sha="$(tr -d '\r\n' < deployment-binding/manifest_sha256.txt)"
          .github/scripts/supplier-deploy-verify.sh binding-verify deployment-binding/binding.json "${digest}" "${manifest_sha}"
          .github/scripts/supplier-deploy-verify.sh oci "$(jq -er '.oci_digest' deployment-binding/binding.json)" "${digest}"
          echo "TARGET_DIGEST=${digest}" >>"${GITHUB_ENV}"

      - name: Update Job to exact digest and read it back
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
          AR_REPO_URL: ${{ vars.GCP_AR_REPO_URL }}
        run: |
          set -euo pipefail
          image_ref="${AR_REPO_URL}/server@${TARGET_DIGEST}"
          gcloud run jobs update "${JOB_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --image="${image_ref}" --quiet
          gcloud run jobs describe "${JOB_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --format=json >/tmp/promoted-job.json
          .github/scripts/supplier-resource-association-verify.sh job \
            /tmp/promoted-job.json "${PROJECT_ID}" "${PROJECT_NUMBER}" "${REGION}" "${JOB_NAME}" \
            "${RUNNER_SERVICE_ACCOUNT}" "${EXPECTED_CONSOLE_URL}" "${EXPECTED_POLL_INTERVAL}"
          configured_image="$(jq -er '.spec.template.spec.template.spec.containers[0].image // .template.template.containers[0].image' /tmp/promoted-job.json)"
          [[ "${configured_image}" == "${image_ref}" ]] || { echo "Job image digest read-back mismatch" >&2; exit 1; }

      - name: Execute once and verify request-ID protocol success
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          REGION: ${{ vars.GCP_REGION }}
        run: |
          set -euo pipefail
          execution="$(gcloud run jobs execute "${JOB_NAME}" --project="${PROJECT_ID}" --region="${REGION}" --wait --format='value(metadata.name)')"
          execution="${execution##*/}"
          [[ -n "${execution}" ]] || { echo "manual Job execution name is unavailable" >&2; exit 1; }
          for attempt in $(seq 1 30); do
            gcloud logging read \
              "resource.type=\"cloud_run_job\" AND resource.labels.job_name=\"${JOB_NAME}\" AND labels.\"run.googleapis.com/execution_name\"=\"${execution}\"" \
              --project="${PROJECT_ID}" --freshness=2h --limit=100 --format=json >/tmp/runner-logs.json
            if jq -e '
              any(.[].textPayload?;
                test("supplier batch request [A-Za-z0-9_-]{43} completed: processed_days=[01] remaining_work=(true|false)"))
            ' /tmp/runner-logs.json >/dev/null; then
              break
            fi
            [[ "${attempt}" -lt 30 ]] || { echo "runner completion log with request-ID/protocol result was not found" >&2; exit 1; }
            sleep 5
          done

      - name: Record successful Job promotion and keep Scheduler paused
        run: |
          set -euo pipefail
          echo "Supplier runner Job promotion completed for digest ${TARGET_DIGEST}." >>"${GITHUB_STEP_SUMMARY}"
          echo "Cloud Scheduler remains paused. A separately authorized operator must verify the fixed Scheduler association/shape, resume it, and verify ENABLED state." >>"${GITHUB_STEP_SUMMARY}"
