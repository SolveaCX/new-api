name: GCP Deploy Website

# Builds and deploys the standalone Next.js marketing site (website/) to its own
# Cloud Run service (separate from the Go app). Triggered only when website/ changes.
# Deploy is gated by the "production" GitHub Environment — slZhong must Approve.

# RETIRED 2026-07-16: flatkey.ai now serves website-static/ (see gcp-deploy-website-static.yml).
# Auto-trigger removed to prevent overwriting the static site; keep workflow_dispatch for emergency rollback.
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing website image tag to deploy (skip build). Format: sha-<commit>"
        required: false
        type: string

permissions:
  contents: read
  id-token: write   # required for Workload Identity Federation

env:
  PROJECT_ID:  ${{ vars.GCP_PROJECT_ID }}
  REGION:      ${{ vars.GCP_REGION }}
  AR_REPO_URL: ${{ vars.GCP_AR_REPO_URL }}
  RUN_SERVICE: ${{ vars.GCP_WEB_RUN_SERVICE }}        # newapi-web
  # Public origins baked into the bundle at build time (NEXT_PUBLIC_*) and also
  # set at runtime for the server-side route handlers.
  APP_CONSOLE_ORIGIN: ${{ vars.WEBSITE_APP_CONSOLE_ORIGIN }}   # https://console.flatkey.ai
  ROUTER_ORIGIN:      ${{ vars.WEBSITE_ROUTER_ORIGIN }}        # https://router.flatkey.ai
  SITE_ORIGIN:        ${{ vars.WEBSITE_SITE_ORIGIN }}          # https://flatkey.ai
  COOKIE_SESSION_DOMAIN: ${{ secrets.COOKIE_SESSION_DOMAIN || '.flatkey.ai' }}
  BLOGGER_API_URL:    ${{ vars.BLOGGER_API_URL || 'https://blogger-api-528088078482.us-central1.run.app' }}
  BLOGGER_SITE_SLUG:  ${{ vars.BLOGGER_SITE_SLUG || 'flatkey' }}
  BLOGGER_ACCESS_KEY: ${{ secrets.BLOGGER_ACCESS_KEY }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.compute_image.outputs.image_uri }}
      short_sha: ${{ steps.compute_image.outputs.short_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image URI
        id: compute_image
        run: |
          short_sha="${GITHUB_SHA::12}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            echo "image_uri=${AR_REPO_URL}/website:${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
            echo "SKIP_BUILD=true" >> "$GITHUB_ENV"
          else
            echo "image_uri=${AR_REPO_URL}/website:sha-${short_sha}" >> "$GITHUB_OUTPUT"
            echo "SKIP_BUILD=false" >> "$GITHUB_ENV"
          fi

      - name: Auth to GCP via WIF
        if: env.SKIP_BUILD != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Configure docker for Artifact Registry
        if: env.SKIP_BUILD != 'true'
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Set up Docker buildx
        if: env.SKIP_BUILD != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build & push (website/Dockerfile)
        if: env.SKIP_BUILD != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./website
          file: ./website/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            APP_CONSOLE_ORIGIN=${{ env.APP_CONSOLE_ORIGIN }}
            ROUTER_ORIGIN=${{ env.ROUTER_ORIGIN }}
            SITE_ORIGIN=${{ env.SITE_ORIGIN }}
            COOKIE_SESSION_DOMAIN=${{ env.COOKIE_SESSION_DOMAIN }}
            BLOGGER_API_URL=${{ env.BLOGGER_API_URL }}
            BLOGGER_SITE_SLUG=${{ env.BLOGGER_SITE_SLUG }}
          tags: |
            ${{ steps.compute_image.outputs.image_uri }}
            ${{ env.AR_REPO_URL }}/website:main-latest
          cache-from: type=gha,scope=website
          cache-to: type=gha,mode=max,scope=website,ignore-error=true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production   # ← manual approval gate happens here
    steps:
      - name: Auth to GCP via WIF
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy new revision with NO traffic
        id: deploy
        run: |
          set -euo pipefail
          revision_suffix="$(date -u +%Y%m%d-%H%M%S)-${{ needs.build.outputs.short_sha }}"
          # Keep runtime env in sync on every deploy (TF only seeds them at
          # bring-up and then ignores env). Idempotent delta updates.
          env_kvs=()
          if [[ -n "${APP_CONSOLE_ORIGIN}" ]]; then
            env_kvs+=("APP_CONSOLE_ORIGIN=${APP_CONSOLE_ORIGIN}")
          fi
          if [[ -n "${ROUTER_ORIGIN}" ]]; then
            env_kvs+=("ROUTER_ORIGIN=${ROUTER_ORIGIN}")
          fi
          if [[ -n "${SITE_ORIGIN}" ]]; then
            env_kvs+=("SITE_ORIGIN=${SITE_ORIGIN}")
          fi
          if [[ -n "${COOKIE_SESSION_DOMAIN}" ]]; then
            env_kvs+=("COOKIE_SESSION_DOMAIN=${COOKIE_SESSION_DOMAIN}")
          fi
          if [[ -n "${BLOGGER_ACCESS_KEY}" ]]; then
            env_kvs+=("BLOGGER_ACCESS_KEY=${BLOGGER_ACCESS_KEY}")
          fi
          if [[ -n "${BLOGGER_API_URL}" ]]; then
            env_kvs+=("BLOGGER_API_URL=${BLOGGER_API_URL}")
          fi
          if [[ -n "${BLOGGER_SITE_SLUG}" ]]; then
            env_kvs+=("BLOGGER_SITE_SLUG=${BLOGGER_SITE_SLUG}")
          fi
          env_args=()
          if [[ ${#env_kvs[@]} -gt 0 ]]; then
            env_args=(--update-env-vars="$(IFS=,; echo "${env_kvs[*]}")")
          fi
          gcloud run services update "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" \
            --region="${REGION}" \
            --image="${{ needs.build.outputs.image_uri }}" \
            --port=4000 \
            --revision-suffix="${revision_suffix}" \
            --no-traffic \
            "${env_args[@]}" \
            --quiet
          new_rev="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.latestCreatedRevisionName)')"
          echo "new_revision=${new_rev}" >> "$GITHUB_OUTPUT"
          echo "Deployed revision: ${new_rev}"

      - name: Health check the new revision
        run: |
          set -euo pipefail
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --update-tags=canary="${{ steps.deploy.outputs.new_revision }}" \
            --quiet
          tag_url="$(gcloud run services describe "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --format='value(status.traffic[].url)' | tr ';' '\n' | grep canary || true)"
          if [[ -z "${tag_url}" ]]; then
            echo "Could not resolve canary tag URL" >&2; exit 1
          fi
          echo "Probing ${tag_url}/ ..."
          for i in $(seq 1 30); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${tag_url}/" || true)
            echo "attempt $i → $code"
            if [[ "${code}" == "200" ]]; then exit 0; fi
            sleep 5
          done
          echo "Health check failed" >&2
          exit 1

      - name: Promote to 100%
        run: |
          gcloud run services update-traffic "${RUN_SERVICE}" \
            --project="${PROJECT_ID}" --region="${REGION}" \
            --to-revisions="${{ steps.deploy.outputs.new_revision }}=100" \
            --quiet

      - name: Summary
        run: |
          echo "### Website deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- Service:  \`${RUN_SERVICE}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Revision: \`${{ steps.deploy.outputs.new_revision }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image:    \`${{ needs.build.outputs.image_uri }}\`" >> "$GITHUB_STEP_SUMMARY"
