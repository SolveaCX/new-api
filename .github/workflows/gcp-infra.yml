name: GCP Infra (Terraform)

on:
  pull_request:
    paths:
      - "deploy/gcp/**"
      - ".github/workflows/gcp-*.yml"
      - ".github/scripts/supplier-*.sh"
      - ".github/scripts/fixtures/supplier-resource-association/**"
      - "Dockerfile"
      - "common/build_manifest.go"
      - "common/build_manifest_source_contract_test.go"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: deploy/gcp/envs/prod

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"
          terraform_wrapper: false

      - name: Terraform fmt
        run: terraform fmt -check -recursive ../..

      - name: Terraform init without production backend
        run: terraform init -backend=false -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Supplier deployment security contracts
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          go test ./common -run '^TestSupplierReleaseManifestCapabilitiesTrackSourceV1$'
          bash -n .github/scripts/supplier-*.sh
          bash .github/scripts/supplier-deploy-verify-test.sh
          bash .github/scripts/supplier-resource-association-verify-test.sh
          bash .github/scripts/supplier-workflow-contract-test.sh
          bash .github/scripts/supplier-terraform-contract-test.sh

      - name: Explain fail-closed PR validation scope
        run: |
          echo "This job intentionally has no id-token permission, GCP authentication, or remote-state access."
          echo "It proves formatting and Terraform configuration validity only; an Owner-ADC refreshing plan remains mandatory before apply."
