    <script data-registration-email-verification-bootstrap>
      ;(function (window) {
        if (window.location.pathname !== '/sign-up/verify') return

        var fragment = window.location.hash.slice(1)
        var token = new URLSearchParams(fragment).get('token')
        token = token && token.trim()
        if (!token) return

        window.history.replaceState(
          window.history.state,
          '',
          window.location.pathname + window.location.search
        )

        var requestBody = JSON.stringify({ token: token })
        token = null
        window.__registrationEmailVerificationRequest = window
          .fetch('/api/registration/email-verification/exchange', {
            method: 'POST',
            credentials: 'same-origin',
            headers: { 'Content-Type': 'application/json' },
            body: requestBody,
          })
          .then(function (response) {
            return response.json()
          })
        requestBody = null
      })(window)
    </script>
